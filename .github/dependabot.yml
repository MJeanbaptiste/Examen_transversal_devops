version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/tienda-tech-backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/tienda-tech-backend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/tienda-tech-frontend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/tienda-tech-db"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
