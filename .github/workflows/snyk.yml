name: Snyk Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  snyk-scan:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./tienda-tech-backend

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=tienda-tech-backend/package.json --severity-threshold=high
        continue-on-error: false

      - name: Block deployment on vulnerability
        if: failure()
        run: |
          echo "SECURITY ALERT: Snyk found vulnerabilities"
          echo "Deployment is BLOCKED until vulnerabilities are resolved"
          exit 1
