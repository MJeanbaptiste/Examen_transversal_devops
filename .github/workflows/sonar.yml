name: SonarQube Code Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarqube-scan:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias y generar cobertura
        working-directory: ./tienda-tech-backend
        run: |
          npm install
          npm test

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Block deployment on quality gate failure
        if: failure()
        run: |
          echo "QUALITY ALERT: SonarQube analysis failed"
          echo "Deployment is BLOCKED until code quality issues are resolved"
          exit 1
